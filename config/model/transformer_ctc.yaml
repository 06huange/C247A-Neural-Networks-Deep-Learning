# @package _global_
module:
  _target_: emg2qwerty.lightning.TransformerCTCModule
  in_features: 528
  mlp_features: [192]
  transformer:
    _target_: emg2qwerty.modules.ConvTransformerEncoder
    d_model: 384
    nhead: 8
    num_layers: 4
    dim_feedforward: 1024
    dropout: 0.1
    conv_kernel_size: 5
    conv_layers: 2
    use_sinusoidal_pos_emb: true
    max_len: 200000

  # keep these, since your module still expects them
  optimizer: ${optimizer}
  lr_scheduler: ${lr_scheduler}
  decoder: ${decoder}

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]